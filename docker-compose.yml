version: '3.9'
services:
  backend:
    build: ./backend
    container_name: market
    volumes:
      - ./backend:/app
      - ./frontend:/app/../frontend
      - ../marketplace_prep/config:/marketplace_prep/config:ro
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    restart: unless-stopped

  tunnel:
    image: cloudflare/cloudflared:latest
    container_name: market_tunnel
    command: tunnel --url http://backend:8000 --no-autoupdate
    depends_on:
      - backend
    restart: unless-stopped
    profiles:
      - tunnel
