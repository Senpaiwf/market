# config/categories.yaml
# Правила маппинга внутренних категорий (папка МС) → категории маркетплейсов.
#
# Структура правила:
#   pattern      — строка для сравнения
#   pattern_type — exact | contains | regex
#   field        — поле RawProduct для проверки (default: internal_category)
#   marketplace  — ozon | wb | ym
#   cat_id       — ID категории на маркетплейсе
#   cat_type_id  — type_id для Ozon (desc_cat_id + type_id = полный ключ)
#   cat_name     — название категории (для логов и UI)
#   priority     — число (больше = важнее, применяется первым)
#
# ID верифицированы из реальных кэшей:
#   ozon_categories.json, wb_categories.json, yandex_category.json
#
# Ozon:  cat_id = desc_cat_id,  cat_type_id = type_id
# WB:    cat_id = subjectID (число из ключа 's_NNNN' в wb_categories.json)
# YM:    cat_id = числовой ID из yandex_category.json
#
# ════════════════════════════════════════════════════════════════════════════
# ПРИОРИТЕТЫ:
#   70  — точные папки МС (exact), верифицированные карточки
#   60  — точные папки МС (exact)
#   50  — подстрочные правила по папке (contains)
#   25  — правила по названию товара (field: name)
#   10  — общие regex-fallback
# ════════════════════════════════════════════════════════════════════════════

